name: Nightly MCP Integration Test

on:
  schedule:
    # Run every night at 2:00 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  mcp-integration-test:
    name: MCP integration test (${{ matrix.launcher.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        launcher:
          - name: npx
            id: npx
            command: npx
            args_json: '["-y", "hevy-mcp@latest"]'
            diagnostics_path: test-results/nightly-npx.json
          - name: bunx
            id: bunx
            command: bunx
            args_json: '["hevy-mcp@latest"]'
            diagnostics_path: test-results/nightly-bunx.json
          - name: source
            id: source
            command: node
            args_json: '["dist/cli.mjs"]'
            diagnostics_path: test-results/nightly-source.json

    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        id: setup_node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install Node dependencies
        id: install_npm_deps
        run: npm ci --no-audit --no-fund

      - name: Build local source
        if: matrix.launcher.name == 'source'
        run: npm run build

      - name: Set up Bun
        if: matrix.launcher.command == 'bunx'
        uses: oven-sh/setup-bun@v2

      - name: Run MCP integration test
        id: run_mcp_integration_test
        run: node tests/nightly/test_hevy_mcp.mjs
        env:
          HEVY_API_KEY: ${{ secrets.HEVY_API_KEY }}
          HEVY_MCP_COMMAND: ${{ matrix.launcher.command }}
          HEVY_MCP_ARGS_JSON: ${{ matrix.launcher.args_json }}
          HEVY_MCP_LAUNCHER: ${{ matrix.launcher.id }}
          HEVY_MCP_SOURCE_REVISION: ${{ matrix.launcher.id == 'source' && github.sha || '' }}
          HEVY_MCP_DIAGNOSTICS_PATH: ${{ matrix.launcher.diagnostics_path }}

      - name: Upload redacted nightly diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-diagnostics-${{ matrix.launcher.id }}
          path: ${{ matrix.launcher.diagnostics_path }}
          if-no-files-found: warn
          retention-days: 7

  worker-http-live:
    name: Hosted Worker HTTP integration
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"

      - name: Install Node dependencies
        run: npm ci --no-audit --no-fund

      - name: Run hosted Worker HTTP integration test
        run: npm run test:worker-http:live
        env:
          HEVY_API_KEY: ${{ secrets.HEVY_API_KEY }}
          HEVY_RUN_LIVE_WORKER_TESTS: "1"
          HEVY_WORKER_HTTP_URL: "https://hevy.chrisdoc.dev/mcp"
