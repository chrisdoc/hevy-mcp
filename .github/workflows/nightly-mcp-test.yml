name: Nightly MCP Integration Test

on:
  schedule:
    # Run every night at 2:00 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  mcp-integration-test:
    name: MCP integration test (${{ matrix.launcher.name }}, ${{ matrix.launcher.validation_level }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        launcher:
          - name: npx
            validation_level: Node 24 published-package smoke
            command: npx
            args_json: '["-y", "hevy-mcp@latest"]'
          - name: bunx
            validation_level: launcher smoke only; not a Bun runtime support claim
            command: bunx
            args_json: '["hevy-mcp@latest"]'
          - name: source
            validation_level: Node 24 primary source runtime
            command: node
            args_json: '["dist/cli.mjs"]'

    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        id: setup_node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install Node dependencies
        id: install_npm_deps
        run: npm ci --no-audit --no-fund

      - name: Build local source
        if: matrix.launcher.name == 'source'
        run: npm run build

      - name: Set up Bun
        if: matrix.launcher.command == 'bunx'
        uses: oven-sh/setup-bun@v2

      - name: Run MCP integration test
        id: run_mcp_integration_test
        run: node tests/nightly/test_hevy_mcp.mjs
        env:
          HEVY_API_KEY: ${{ secrets.HEVY_API_KEY }}
          HEVY_MCP_COMMAND: ${{ matrix.launcher.command }}
          HEVY_MCP_ARGS_JSON: ${{ matrix.launcher.args_json }}
