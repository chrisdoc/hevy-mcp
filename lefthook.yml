pre-commit:
  commands:
    check:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      run: npx oxlint --type-aware --type-check {staged_files} && npx oxfmt --write {staged_files}
      stage_fixed: true
    tests:
      run: npm test

# Validate commit messages
commit-msg:
  commands:
    "lint commit message":
      run: npx commitlint --edit {1}
