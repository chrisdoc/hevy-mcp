name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  ROLLUP_SKIP_NODEJS_NATIVE_BUILD: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  HEVY_API_KEY: ${{ secrets.HEVY_API_KEY }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify commit messages
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
          else
            if [ -z "${{ github.event.before }}" ] || [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
              npx commitlint --from HEAD~1 --to HEAD --verbose
            else
              npx commitlint --from ${{ github.event.before }} --to ${{ github.event.after }} --verbose
            fi
          fi

      - name: Check for changeset
        if: github.event_name == 'pull_request'
        run: npx changeset status --since=origin/${{ github.base_ref }}

      - name: Run Check
        run: npm run check

      - name: Run build
        run: npm run build
        env:
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Check if integration tests changed
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            integration:
              - 'tests/integration/**'
              - '.github/workflows/build-and-test.yml'

      - name: Run tests with coverage (including integration)
        if: steps.filter.outputs.integration == 'true' && env.HEVY_API_KEY != ''
        run: npx vitest run --coverage

      - name: Run tests with coverage (unit only)
        if: steps.filter.outputs.integration != 'true' || env.HEVY_API_KEY == ''
        run: npx vitest run --coverage --exclude "tests/integration/**"

      - name: "Warning: Integration tests skipped"
        if: steps.filter.outputs.integration == 'true' && env.HEVY_API_KEY == ''
        run: echo "Skipping integration tests because HEVY_API_KEY is not set. Please configure the HEVY_API_KEY secret in your repository to run integration tests."

      - name: Upload results to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info

  otel-cicd-action:
    if: always()
    name: OpenTelemetry Export Trace
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Export workflow
        uses: corentinmusard/otel-cicd-action@v4
        with:
          otlpEndpoint: "grpc://in-otel.hyperdx.io:4317/"
          otlpHeaders: ${{ secrets.HYPERDX_OTLP_HEADERS }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          runId: ${{ github.run_id }}
