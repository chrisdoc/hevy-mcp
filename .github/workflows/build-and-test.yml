name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

env:
  ROLLUP_SKIP_NODEJS_NATIVE_BUILD: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up pnpm
      uses: pnpm/action-setup@v4
      with:
        run_install: false

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run Check
      run: pnpm run check

    - name: Validate OpenAPI Spec
      run: pnpm run validate:openapi

    - name: Run build
      run: pnpm run build
      env:
        SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
        SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

    - name: Run tests with coverage
      run: |
        if [ -n "${HEVY_API_KEY}" ]; then
          pnpm vitest run --coverage
          exit 0
        fi

        echo "::warning::HEVY_API_KEY is not set; skipping tests/integration/hevy-mcp.integration.test.ts"
        if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF}" = "refs/heads/main" ]; then
          echo "::error::HEVY_API_KEY must be configured for pushes to main"
          exit 1
        fi

        if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
          if ! command -v gh >/dev/null; then
            echo "::error::gh CLI is required to inspect pull request file changes"
            exit 1
          fi

          pr_number=$(node --input-type=module -e "import fs from 'node:fs'; const e=JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH,'utf8')); console.log(e.pull_request?.number ?? '');")
          if [ -n "${pr_number}" ]; then
            changed_files=$(gh api --paginate "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}/files?per_page=100" -q '.[].filename') || {
              echo "::error::Failed to fetch pull request file list"
              exit 1
            }

            if echo "${changed_files}" | grep -Fxq 'tests/integration/hevy-mcp.integration.test.ts'; then
              echo '::error::This PR modifies tests/integration/hevy-mcp.integration.test.ts, but HEVY_API_KEY is not set. Please configure the secret or ask a maintainer to run this integration test.'
              exit 1
            fi
          fi
        fi

        # If additional tests end up requiring HEVY_API_KEY, add them to this exclude list.
        pnpm vitest run --coverage --exclude tests/integration/hevy-mcp.integration.test.ts
      env:
        HEVY_API_KEY: ${{ secrets.HEVY_API_KEY }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload results to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage/lcov.info

  otel-cicd-action:
    if: always()
    name: OpenTelemetry Export Trace
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Export workflow
        uses: corentinmusard/otel-cicd-action@v4
        with:
          otlpEndpoint: 'grpc://in-otel.hyperdx.io:4317/'
          otlpHeaders: ${{ secrets.HYPERDX_OTLP_HEADERS }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          runId: ${{ github.run_id }}
