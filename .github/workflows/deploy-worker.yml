name: Deploy Cloudflare Worker

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
  workflow_run:
    workflows:
      - Build and Test
    types:
      - completed

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  preview:
    name: Deploy PR preview
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    concurrency:
      group: cloudflare-worker-preview-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    environment:
      name: preview
      url: ${{ steps.preview_url.outputs.url }}

    steps:
      - name: Checkout pull request commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Upload preview version
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WRANGLER_OUTPUT_FILE_PATH: ${{ runner.temp }}/wrangler-output.ndjson
        run: >-
          npx wrangler versions upload
          --preview-alias pr-${{ github.event.pull_request.number }}
          --message "GitHub PR #${{ github.event.pull_request.number }} at ${{ github.event.pull_request.head.sha }}"

      - name: Publish preview URL
        id: preview_url
        env:
          EXPECTED_PREFIX: pr-${{ github.event.pull_request.number }}-hevy-mcp.
          WRANGLER_OUTPUT_FILE_PATH: ${{ runner.temp }}/wrangler-output.ndjson
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const entries = fs
            .readFileSync(process.env.WRANGLER_OUTPUT_FILE_PATH, "utf8")
            .trim()
            .split("\n")
            .filter(Boolean)
            .map((line) => JSON.parse(line));
          const upload = entries.findLast(
            (entry) => entry.type === "version-upload",
          );
          const previewUrl = new URL(upload?.preview_alias_url ?? "");

          if (
            previewUrl.protocol !== "https:" ||
            !previewUrl.hostname.startsWith(process.env.EXPECTED_PREFIX) ||
            !previewUrl.hostname.endsWith(".workers.dev")
          ) {
            throw new Error("Wrangler did not return the expected preview alias URL");
          }

          const mcpUrl = new URL("/mcp", previewUrl);

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `url=${mcpUrl.href}\n`);
          fs.appendFileSync(
            process.env.GITHUB_STEP_SUMMARY,
            [
              "## Cloudflare Worker preview",
              "",
              `- Alias: \`pr-${{ github.event.pull_request.number }}\``,
              `- MCP endpoint: ${mcpUrl.href}`,
              `- Commit: \`${{ github.event.pull_request.head.sha }}\``,
              "",
            ].join("\n"),
          );
          NODE

  production:
    name: Deploy production
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.repository.full_name == github.repository &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    concurrency:
      group: cloudflare-worker-production
      cancel-in-progress: false
    environment:
      name: production
      url: https://hevy.chrisdoc.dev/mcp

    steps:
      - name: Checkout tested commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy tested version
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: >-
          npx wrangler deploy
          --message "GitHub main at ${{ github.event.workflow_run.head_sha }}"
