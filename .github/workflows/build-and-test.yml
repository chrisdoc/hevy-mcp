name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  ROLLUP_SKIP_NODEJS_NATIVE_BUILD: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  upload-source-event:
    name: Upload source event
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Upload source event
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: source-event
          path: ${{ github.event_path }}
          if-no-files-found: error

  build:
    name: Build and test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - "24.x"
          - "26.x"

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Set up mise tools
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1

      - name: Install dependencies
        run: npm ci

      - parallel:
          - name: Run type check
            run: npm run check:types

          - name: Check server manifest
            run: npm run check:server-manifest

          - name: Run Check
            run: npm run check

      - name: Verify commit messages
        if: github.event_name == 'pull_request' && matrix.node-version == '24.x'
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

      - name: Check for changeset
        if: >-
          github.event_name == 'pull_request' &&
          matrix.node-version == '24.x' &&
          github.actor != 'dependabot[bot]' &&
          github.head_ref != 'changeset-release/main' &&
          !(
            github.event.pull_request.head.repo.full_name == github.repository &&
            github.event.pull_request.user.login == 'mergify[bot]' &&
            startsWith(github.head_ref, 'mergify/merge-queue/')
          )
        run: npx changeset status --since=origin/${{ github.base_ref }}

      - name: Run nightly diagnostics redaction regression tests
        if: matrix.node-version == '24.x'
        run: node --test tests/nightly/diagnostics.test.mjs
        env:
          HEVY_API_KEY: ""

      - name: Run build
        run: npm run build
        env:
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          OTEL_COLLECTOR_TOKEN: ${{ secrets.OTEL_COLLECTOR_TOKEN }}

      - name: Run Worker HTTP integration tests
        if: matrix.node-version == '24.x'
        run: npm run test:worker-http

      - name: Run mocked integration tests with coverage
        if: matrix.node-version == '24.x'
        run: npm run test:mcp -- --coverage --coverage.reportsDirectory=coverage/mocked

      - name: Run mocked integration tests
        if: matrix.node-version == '26.x'
        run: npm run test:mcp

      - name: Run unit tests with coverage and JUnit output
        if: ${{ !cancelled() && matrix.node-version == '24.x' }}
        run: npm run test:unit -- --coverage --coverage.reportsDirectory=coverage/unit --reporter=default --reporter=junit --outputFile.junit=test-results/unit-tests.xml

      - name: Run unit tests with coverage
        if: ${{ !cancelled() && matrix.node-version == '26.x' }}
        run: npm run test:unit -- --coverage

      - name: Run contract baseline
        if: ${{ !cancelled() && matrix.node-version == '24.x' }}
        run: npm run test:contract

      - name: Run stdio baseline
        if: ${{ !cancelled() && matrix.node-version == '24.x' }}
        run: npm run test:stdio

      - name: Run package baseline
        if: ${{ !cancelled() && matrix.node-version == '24.x' }}
        run: npm run test:pack

      - name: Run performance baseline
        if: ${{ !cancelled() && matrix.node-version == '24.x' }}
        run: npm run test:performance

      - name: Upload performance summary
        if: ${{ always() && matrix.node-version == '24.x' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: performance-summary-node-24
          path: test-results/performance/summary.json
          if-no-files-found: error

      - name: Upload unit test results
        if: ${{ !cancelled() && matrix.node-version == '24.x' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unit-test-results-node-24
          path: test-results/unit-tests.xml
          if-no-files-found: warn

      - name: Upload results to Codecov
        if: matrix.node-version == '24.x'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/unit/lcov.info,./coverage/mocked/lcov.info

  docker:
    name: Build and smoke test Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          tags: hevy-mcp:ci

      - name: Smoke test version output without an API key
        run: docker run --rm hevy-mcp:ci --version

      - name: Smoke test help output without an API key
        run: docker run --rm hevy-mcp:ci --help

      - name: Verify hardened runtime structure
        run: |
          docker run --rm --entrypoint sh hevy-mcp:ci -c '
            test "$(id -u)" -ne 0 &&
            test ! -e /app/node_modules &&
            test -f /app/standalone.mjs
          '

  deploy-production:
    name: Deploy production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build, docker]
    runs-on: ubuntu-latest
    concurrency:
      group: cloudflare-worker-production
      cancel-in-progress: false
    environment:
      name: production
      url: https://hevy.chrisdoc.dev/mcp

    steps:
      - name: Checkout tested commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy tested version
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: >-
          npx wrangler deploy
          --message "GitHub main at ${{ github.sha }}"

  otel-cicd-action:
    if: always()
    name: OpenTelemetry Export Trace
    runs-on: ubuntu-latest
    needs: [build, docker, deploy-production]
    steps:
      - name: Export workflow
        uses: corentinmusard/otel-cicd-action@f2d88ecf54d9dd3e01ea95e25f93603212ee93d3 # v4.0.1
        with:
          otlpEndpoint: "https://otel.chrisdoc.dev/v1/traces"
          otlpHeaders: "Authorization=Bearer ${{ secrets.OTEL_COLLECTOR_TOKEN }}"
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          runId: ${{ github.run_id }}
