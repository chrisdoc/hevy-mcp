queue_rules:
  - name: default
    merge_method: squash
    update_method: rebase
    # Batch several PRs into a single speculative CI run to clear the backlog faster.
    batch_size: 3
    batch_max_wait_time: 5 min
    # Conditions to enter the queue.
    queue_conditions:
      - base = main
      - check-success = "Build and test (Node 24.x)"
      - check-success = "Build and test (Node 26.x)"
    # Conditions re-checked at the front of the queue before merging.
    merge_conditions:
      - check-success = "Build and test (Node 24.x)"
      - check-success = "Build and test (Node 26.x)"

pull_request_rules:
  - name: Queue pull requests labeled 'queue'
    conditions:
      - base = main
      - label = queue
      # Never route the automated Changesets release PR through the queue.
      - -head ~= ^changeset-release/
    actions:
      queue:
        name: default

  - name: Automatically queue Dependabot pull requests
    conditions:
      - base = main
      - author = dependabot[bot]
      - check-success = "Build and test (Node 24.x)"
      - check-success = "Build and test (Node 26.x)"
    actions:
      queue:
        name: default
  - name: Auto-merge approved PRs
    conditions:
      - base = main
      - "#approved-reviews-by >= 2"
      - check-success = ci/build
      # Changesets release PRs are merged manually on a cadence; skip auto-merge.
      - -head ~= ^changeset-release/
    actions:
      merge:
        method: squash
  - name: Keep PRs up to date
    conditions:
      - -draft
      - "#commits-behind >= 5"
      # Never rebase the Changesets release PR (it manages its own commits).
      - -head ~= ^changeset-release/
    actions:
      update: null
priority_rules:
  - name: dependabot
    priority: low
    conditions:
      - author = dependabot[bot]
    allow_checks_interruption: false
