name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

env:
  ROLLUP_SKIP_NODEJS_NATIVE_BUILD: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up pnpm
      uses: pnpm/action-setup@v4
      with:
        run_install: false

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run Check
      run: pnpm run check

    - name: Validate OpenAPI Spec
      run: pnpm run validate:openapi

    - name: Run build
      run: pnpm run build
      env:
        SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
        SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

    - name: Run tests with coverage
      run: |
        if [ -n "${HEVY_API_KEY}" ]; then
          pnpm vitest run --coverage
          exit 0
        fi

        echo "::warning::HEVY_API_KEY is not set; skipping tests/integration/hevy-mcp.integration.test.ts"
        if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF}" = "refs/heads/main" ]; then
          echo "::error::HEVY_API_KEY must be configured for pushes to main"
          exit 1
        fi

        if [ "${GITHUB_EVENT_NAME}" = "pull_request" ] && ! command -v jq >/dev/null; then
          echo "::error::jq is required to inspect pull request file changes"
          exit 1
        fi

        if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
          pr_number=$(jq -r '.pull_request.number // empty' < "$GITHUB_EVENT_PATH")
          if [ -n "${pr_number}" ]; then
            api_url_base="https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls/${pr_number}/files?per_page=100"
            changed_hevy_integration_test=false

            page=1
            max_pages=100
            while [ "$page" -le "$max_pages" ]; do
              api_url="${api_url_base}&page=${page}"
              body=$(curl -fsSL -H "Authorization: Bearer ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" "$api_url") || {
                echo "::error::Failed to fetch PR file list"
                exit 1
              }
              changed_files=$(printf '%s' "$body" | jq -r '.[].filename')
              if [ -z "${changed_files}" ]; then
                break
              fi

              if echo "${changed_files}" | grep -Fxq 'tests/integration/hevy-mcp.integration.test.ts'; then
                changed_hevy_integration_test=true
                break
              fi

              page=$((page + 1))
            done

            if [ "$page" -gt "$max_pages" ]; then
              echo "::error::Failed to fetch PR file list (exceeded ${max_pages} pages)"
              exit 1
            fi

            if [ "$changed_hevy_integration_test" = "true" ]; then
              echo '::error::This PR modifies tests/integration/hevy-mcp.integration.test.ts, but HEVY_API_KEY is not set. Please configure the secret or ask a maintainer to run this integration test.'
              exit 1
            fi
          fi
        fi

        # If additional tests end up requiring HEVY_API_KEY, add them to this exclude list.
        pnpm vitest run --coverage --exclude tests/integration/hevy-mcp.integration.test.ts
      env:
        HEVY_API_KEY: ${{ secrets.HEVY_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload results to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage/lcov.info

  otel-cicd-action:
    if: always()
    name: OpenTelemetry Export Trace
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Export workflow
        uses: corentinmusard/otel-cicd-action@v4
        with:
          otlpEndpoint: 'grpc://in-otel.hyperdx.io:4317/'
          otlpHeaders: ${{ secrets.HYPERDX_OTLP_HEADERS }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          runId: ${{ github.run_id }}
