name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  ROLLUP_SKIP_NODEJS_NATIVE_BUILD: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  HEVY_API_KEY: ${{ secrets.HEVY_API_KEY }}

jobs:
  build:
    name: Build and test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - "22.18.0"
          - "24.x"
          - "26.x"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify commit messages
        if: github.event_name == 'pull_request' && matrix.node-version == '22.18.0'
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

      - name: Check for changeset
        if: github.event_name == 'pull_request' && matrix.node-version == '22.18.0' && github.actor != 'dependabot[bot]' && github.head_ref != 'changeset-release/main'
        run: npx changeset status --since=origin/${{ github.base_ref }}

      - name: Run Check
        run: npm run check

      - name: Run build
        run: npm run build
        env:
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Check if integration tests changed
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            integration:
              - 'tests/integration/**'
              - '.github/workflows/build-and-test.yml'

      - name: Run tests with coverage (including integration)
        if: steps.filter.outputs.integration == 'true' && env.HEVY_API_KEY != ''
        run: npx vitest run --coverage

      - name: Run tests with coverage (unit only)
        if: steps.filter.outputs.integration != 'true' || env.HEVY_API_KEY == ''
        run: npx vitest run --coverage --exclude "tests/integration/**"

      - name: "Warning: Integration tests skipped"
        if: steps.filter.outputs.integration == 'true' && env.HEVY_API_KEY == ''
        run: echo "Skipping integration tests because HEVY_API_KEY is not set. Please configure the HEVY_API_KEY secret in your repository to run integration tests."

      - name: Upload results to Codecov
        if: matrix.node-version == '22.18.0'
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info

  otel-cicd-action:
    if: always()
    name: OpenTelemetry Export Trace
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Export workflow
        uses: corentinmusard/otel-cicd-action@v4
        with:
          otlpEndpoint: "grpc://in-otel.hyperdx.io:4317/"
          otlpHeaders: ${{ secrets.HYPERDX_OTLP_HEADERS }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          runId: ${{ github.run_id }}
