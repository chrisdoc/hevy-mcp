name: Nightly MCP Integration Test

on:
  schedule:
    # Run every night at 2:00 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  mcp-integration-test:
    name: MCP integration test (${{ matrix.launcher.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        launcher:
          - name: npx
            command: npx
            args_json: '["-y", "hevy-mcp@latest"]'
          - name: bunx
            command: bunx
            args_json: '["hevy-mcp@latest"]'

    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        id: setup_node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Set up Python
        id: setup_python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Bun
        if: matrix.launcher.command == 'bunx'
        uses: oven-sh/setup-bun@v2

      - name: Install mcp-use
        id: install_mcp_use
        run: pip install mcp-use

      - name: Run MCP integration test
        id: run_mcp_integration_test
        run: python tests/nightly/test_hevy_mcp.py
        env:
          HEVY_API_KEY: ${{ secrets.HEVY_API_KEY }}
          HEVY_MCP_COMMAND: ${{ matrix.launcher.command }}
          HEVY_MCP_ARGS_JSON: ${{ matrix.launcher.args_json }}
