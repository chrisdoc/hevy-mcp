name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

env:
  ROLLUP_SKIP_NODEJS_NATIVE_BUILD: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up pnpm
      uses: pnpm/action-setup@v4
      with:
        run_install: false

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run Check
      run: pnpm run check

    - name: Validate OpenAPI Spec
      run: pnpm run validate:openapi

    - name: Run build
      run: pnpm run build
      env:
        SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
        SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

    - name: Run tests with coverage
      run: |
        if [ -n "${HEVY_API_KEY}" ]; then
          pnpm vitest run --coverage
        elif [ "${IS_FORK_PR}" = "true" ]; then
          echo "::warning::HEVY_API_KEY is not available for fork PRs; skipping tests/integration/hevy-mcp.integration.test.ts"

          pr_number=$(jq -r '.pull_request.number // empty' < "$GITHUB_EVENT_PATH")
          if [ -n "${pr_number}" ]; then
            changed_files=$(curl -sS -H "Authorization: Bearer ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls/${pr_number}/files?per_page=100" | jq -r '.[].filename')
            if echo "${changed_files}" | grep -Fxq 'tests/integration/hevy-mcp.integration.test.ts'; then
              echo '::error::This fork PR modifies tests/integration/hevy-mcp.integration.test.ts, but HEVY_API_KEY is not available for fork PRs. Please ask a maintainer to run this integration test.'
              exit 1
            fi
          fi

          # If additional tests end up requiring HEVY_API_KEY, add them to this exclude list.
          pnpm vitest run --coverage --exclude tests/integration/hevy-mcp.integration.test.ts
        else
          echo "::error::HEVY_API_KEY is not set; running without tests/integration/hevy-mcp.integration.test.ts"
          # If additional tests end up requiring HEVY_API_KEY, add them to this exclude list.
          pnpm vitest run --coverage --exclude tests/integration/hevy-mcp.integration.test.ts
          test_status=$?
          if [ "$test_status" -ne 0 ]; then
            exit "$test_status"
          fi
          exit 1
        fi
      env:
        HEVY_API_KEY: ${{ secrets.HEVY_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        IS_FORK_PR: >-
          ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && github.event.pull_request.head.repo.full_name != github.repository }}

    - name: Upload results to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage/lcov.info

  otel-cicd-action:
    if: always()
    name: OpenTelemetry Export Trace
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Export workflow
        uses: corentinmusard/otel-cicd-action@v4
        with:
          otlpEndpoint: 'grpc://in-otel.hyperdx.io:4317/'
          otlpHeaders: ${{ secrets.HYPERDX_OTLP_HEADERS }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          runId: ${{ github.run_id }}
